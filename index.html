<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.22), transparent 18%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.12), transparent 20%),
    #f8edc9;  
      font-family: "Arial Rounded MT Bold", "Microsoft JhengHei", sans-serif;
      position: relative;
      overflow: hidden;
      padding: 24px;
    }

    .timer-card {
      width: 520px;
      min-height: 460px;
      padding: 40px 32px 28px;
      border-radius: 28px;
      background: #fff7e8;
      box-shadow: 0 12px 0 #e7b94d, 0 22px 34px rgba(0, 0, 0, 0.14);
      text-align: center;
      position: relative;
      border: 5px solid #f47c20;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .timer-card::before {
      content: "🍅";
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      background: #fff7e8;
      border-radius: 50%;
      padding: 4px 10px;
    }

    h1 {
      margin-top: 18px;
      margin-bottom: 18px;
      font-size: 80px;
      color: #f47c20;
      font-weight: 900;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.55);
      letter-spacing: 2px;
    }

    .clock {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 180px;
      margin: 10px 0 26px 0;
      padding: 10px 16px;
      border-radius: 20px;
      border: 4px solid #f47c20;
      background: #4a3526;
      color: #fff2a8;
      font-size: clamp(88px, 12vw, 140px);
      font-weight: bold;
      letter-spacing: 6px;
      line-height: 1;
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.08),0 6px 0 #d95e1d;
      text-shadow:
        0 0 8px rgba(255, 239, 159, 0.35),
        0 0 20px rgba(255, 239, 159, 0.15);
      text-align: center;
    }

    .btn {
      border: none;
      outline: none;
      padding: 14px 28px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 999px;
      background: #f47c20;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 0 #d95e1d;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(2px);
      box-shadow: 0 4px 0 #d95e1d;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #d95e1d;
    }

    .hint {
      margin-top: 16px;
      font-size: 25px;
      color: #8d5a20;
      line-height: 1.7;
    }

    /* 右上木板 */
    .wood-board {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 280px;
      min-height: 235px;
      padding: 18px 18px 20px;
      border: 5px solid #d56a21;
      border-radius: 18px;
      box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.14),
        inset 0 2px 10px rgba(255, 255, 255, 0.12),
        inset 0 -3px 10px rgba(70, 35, 10, 0.18);
      color: #4e2f12;
      overflow: hidden;
      background:
       linear-gradient(90deg,
      rgba(255,255,255,0.05) 0%,
      rgba(255,255,255,0.01) 8%,
      rgba(0,0,0,0.05) 14%,
      rgba(255,255,255,0.03) 22%,
      rgba(0,0,0,0.04) 31%,
      rgba(255,255,255,0.02) 40%,
      rgba(0,0,0,0.06) 52%,
      rgba(255,255,255,0.03) 64%,
      rgba(0,0,0,0.04) 78%,
      rgba(255,255,255,0.02) 100%
    ),
    linear-gradient(145deg, #f0a14d, #dd7c2f 55%, #cb6520) ;
    }

    .wood-board::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          8deg,
          rgba(88, 46, 16, 0.07) 0px,
          rgba(88, 46, 16, 0.07) 2px,
          transparent 2px,
          transparent 12px
        );
      opacity: 0.65;
      mix-blend-mode: multiply;
    }

    .wood-board::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .pin,
    .pin-right,
    .chalk-pin,
    .chalk-pin-right {
      position: absolute;
      top: 10px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      z-index: 2;
    }

    .pin,
    .pin-right {
      background: radial-gradient(circle at 35% 35%, #a26d3a, #6e4420 70%);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
    }

    .pin { left: 12px; }
    .pin-right { right: 12px; }

    .board-title {
      position: relative;
      z-index: 2;
      margin: 8px 0 10px;
      text-align: center;
      font-size: 22px;
      color: #fff9e8;
      font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive;
      letter-spacing: 1px;
      text-shadow:
        1px 1px 0 rgba(255,255,255,0.15),
        -1px -1px 0 rgba(255,255,255,0.08),
        0 0 2px rgba(255,255,255,0.12);
      transform: rotate(-1.5deg);
    }

    .board-date {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 14px;
      font-size: 20px;
      color: #fff8e1;
      font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive;
      text-shadow:
        0.6px 0.6px 0 rgba(255,255,255,0.2),
        -0.6px -0.6px 0 rgba(255,255,255,0.08);
      transform: rotate(-2deg);
    }

    .tally-box {
      position: relative;
      z-index: 2;
      min-height: 100px;
      background: rgba(255, 248, 220, 0.12);
      border: 2px dashed rgba(255, 248, 220, 0.35);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 10px 14px;
    }

    @keyframes toy-wiggle {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-1.5deg); }
      50% { transform: rotate(1.5deg); }
      75% { transform: rotate(-1deg); }
      100% { transform: rotate(0deg); }
    }

    .tally-group {
      position: relative;
      width: 66px;
      height: 60px;
      display: inline-block;
      transform: rotate(-2deg);
    }

    .stroke {
      position: absolute;
      width: 3.8px;
      height: 43px;
      background: #fff8eb;
      border-radius: 999px;
      top: 8px;
      box-shadow:
        0 0 1px rgba(255,255,255,0.25),
        0 0 2px rgba(255,255,255,0.15);
      opacity: 0.95;
    }

    .stroke.s1 { left: 6px; height: 40px; transform: rotate(-7deg); }
    .stroke.s2 { left: 20px; height: 45px; transform: rotate(3deg); }
    .stroke.s3 { left: 35px; height: 42px; transform: rotate(-4deg); }
    .stroke.s4 { left: 49px; height: 46px; transform: rotate(5deg); }
    .stroke.diag { width: 4px; height: 62px; left: 28px; top: -1px; transform: rotate(59deg); }

    .single-i {
      font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive;
      font-size: 42px;
      line-height: 1;
      color: #fff8eb;
      text-shadow:
        0 0 1px rgba(255,255,255,0.2),
        0 0 2px rgba(255,255,255,0.12);
      display: inline-block;
      min-width: 18px;
      text-align: center;
      opacity: 0.96;
    }

    .single-i:nth-child(odd) { transform: rotate(-8deg) translateY(1px); }
    .single-i:nth-child(even) { transform: rotate(6deg) translateY(-1px); }

    .board-btn {
      position: relative;
      z-index: 2;
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff0c8;
      color: #7a3f12;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 #c96d2b;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .board-btn:hover {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b77b42;
    }

    .board-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #b77b42;
    }

    /* 左下黑板 */
    .chalk-board {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: 340px;
      min-height: 360px;
      padding: 18px 18px 16px;
      border-radius: 18px;
      border: 8px solid #d8742f;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(180deg, #2f3e35, #243128 65%, #1f2a22);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.16),
    inset 0 1px 0 rgba(255,255,255,0.04),
    inset 0 0 30px rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .chalk-board::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 2px,
          transparent 2px,
          transparent 10px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.01) 0px,
          rgba(255,255,255,0.01) 2px,
          transparent 2px,
          transparent 14px
        );
      opacity: 0.5;
      pointer-events: none;
    }

    .chalk-pin,
    .chalk-pin-right {
      background: radial-gradient(circle at 35% 35%, #b07b4c, #6a4120 70%);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.25);
    }

    .chalk-pin { left: 12px; }
    .chalk-pin-right { right: 12px; }

    .chalk-title {
      position: relative;
      z-index: 2;
      margin: 4px 0 14px;
      font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive;
      color: #f8f8f1;
      font-size: 28px;
      text-align: center;
      text-shadow: 0 0 2px rgba(255,255,255,0.15);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
      transform: rotate(-1deg);
    }

    .todo-input-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;

    }

    .todo-input {
      min-width: 0;
      border: 3px dashed rgba(255,255,255,0.22);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: #fffef8;
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      font-family: "Microsoft JhengHei", sans-serif;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
    }


    .todo-input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .todo-add-btn,
    .eraser-btn {
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .todo-add-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffb347, #f47c20);
      color: #fffaf2;
      box-shadow:
        0 5px 0 #d95e1d,
        0 8px 14px rgba(244, 124, 32, 0.22);
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 0.5px;

      animation: toy-wiggle 3.2s ease-in-out infinite;
    }         

    .eraser-btn {
      width: 56px;
      height: 44px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffe7d6, #f3d4c3);
      box-shadow:
        0 5px 0 #bf9b89,
        0 8px 14px rgba(0, 0, 0, 0.12);
      position: relative;
      flex-shrink: 0;

      animation: toy-wiggle 4s ease-in-out infinite;
    }

    .eraser-btn::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 13px;
      left: 50%;
      top: 10px;
      transform: translateX(-50%) rotate(-12deg);
      background: #ff9ea8;
      border-radius: 4px 4px 2px 2px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .eraser-btn::after {
      content: "✨";
      position: absolute;
      right: -8px;
      top: -6px;
      font-size: 14px;
      opacity: 0.8;
      animation: sparkle 2s infinite;
    }
    @keyframes sparkle {
    0% { transform: scale(0.7); opacity: 0.4; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.7); opacity: 0.4; }
    }
    .eraser-btn:active {
    transform: translateY(4px);
    box-shadow:
    0 2px 0 #bf9b89,
    0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .todo-add-btn:hover,
    .eraser-btn:hover {
      transform: scale(1.05);
    } 
    todo-add-btn::before {
    content: "✦";
    margin-right: 6px;
    color: #fff4c7;

    }
    .todo-add-btn:active {
  transform: translateY(4px) scale(0.95);
    }

    .todo-list {
      position: relative;
      z-index: 2;
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 225px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #fffef5;
      font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", cursive;
      font-size: 22px;
      line-height: 1.25;
      word-break: break-word;
    }

    .todo-check {
      appearance: none;
      -webkit-appearance: none;
      margin-top: 4px;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .todo-check:checked::after {
      content: "✓";
      position: absolute;
      left: 2px;
      top: -3px;
      color: #fff6cf;
      font-size: 20px;
      transform: rotate(-8deg);
    }

    .todo-text {
      position: relative;
      display: inline-block;
      padding-right: 8px;
    }

    .todo-item.done .todo-text {
      color: rgba(255,255,255,0.72);
    }

    .todo-item.done .todo-text::before,
    .todo-item.done .todo-text::after {
      content: "";
      position: absolute;
      left: -4px;
      right: -2px;
      border-radius: 999px;
      background: rgba(255,245,205,0.95);
      box-shadow: 0 0 2px rgba(255,255,255,0.18);
    }

    .todo-item.done .todo-text::before {
      top: 52%;
      height: 3px;
      transform: rotate(-4deg);
      opacity: 0.95;
    }

    .todo-item.done .todo-text::after {
      top: 49%;
      height: 2px;
      transform: rotate(-1deg);
      opacity: 0.72;
    }

    .chalk-dust {
      position: absolute;
      pointer-events: none;
      inset: 0;
      overflow: visible;
      z-index: 5;
    }

    .dust {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255,248,230,0.95);
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(255,255,255,0.2);
      animation: dust-float 900ms ease-out forwards;
    }

    @keyframes dust-float {
      0% {
        opacity: 0.95;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.35);
      }
    }

    @media (max-width: 1100px) {
      body {
        padding-top: 120px;
        padding-bottom: 390px;
      }

      .wood-board {
        top: 14px;
        right: 14px;
        width: 230px;
      }

      .chalk-board {
        left: 14px;
        right: 14px;
        bottom: 14px;
        width: auto;
        min-height: 320px;
      }

      .timer-card {
        width: min(94vw, 520px);
      }

      .clock {
        font-size: clamp(68px, 15vw, 110px);
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>
  <div class="wood-board">
    <span class="pin"></span>
    <span class="pin-right"></span>

    <div class="board-title">Today's Count</div>
    <div class="board-date" id="todayDate"></div>
    <div class="tally-box" id="tallyBox"></div>
    <button class="board-btn" id="addTallyBtn">+ Add One</button>
  </div>

  <div class="chalk-board">
    <span class="chalk-pin"></span>
    <span class="chalk-pin-right"></span>

    <div class="chalk-title">Today's List</div>

    <div class="todo-input-row">
      <input
        id="todoInput"
        class="todo-input"
        type="text"
        placeholder="Write something here..."
        maxlength="60"
      />
      <button id="todoAddBtn" class="todo-add-btn">Add</button>
      <button id="eraseAllBtn" class="eraser-btn" title="Erase all"></button>
    </div>

    <ul id="todoList" class="todo-list"></ul>
  </div>

  <div class="timer-card">
    <h1>Pomodoro</h1>
    <div class="clock" id="clock">25:00</div>
    <button class="btn" id="controlBtn">Start</button>
    <div class="hint">
      Make it Fun, and Do it For FUN.
    </div>
  </div>

  <script>

    if (Notification.permission !== "granted") {
  Notification.requestPermission();
    }
    const TOTAL_TIME = 25 * 60;

    let timeLeft = TOTAL_TIME;
    let timer = null;
    let isRunning = false;
    let isFinished = false;
    let tallyCount = 0;
    let todos = [];

    const clock = document.getElementById("clock");
    const controlBtn = document.getElementById("controlBtn");
    const todayDate = document.getElementById("todayDate");
    const tallyBox = document.getElementById("tallyBox");
    const addTallyBtn = document.getElementById("addTallyBtn");

    const todoInput = document.getElementById("todoInput");
    const todoAddBtn = document.getElementById("todoAddBtn");
    const eraseAllBtn = document.getElementById("eraseAllBtn");
    const todoList = document.getElementById("todoList");

    const cambridgePhoto = document.getElementById("cambridgePhoto");

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatTime(seconds) {
      const minutes = String(Math.floor(seconds / 60)).padStart(2, "0");
      const secs = String(seconds % 60).padStart(2, "0");
      return `${minutes}:${secs}`;
    }

    function updateClock() {
      clock.textContent = formatTime(timeLeft);
    }

    function setTodayDate() {
      const now = new Date();
      const day = now.getDate();
      const month = now.toLocaleString("en-US", { month: "long" });
      const year = now.getFullYear();
      todayDate.textContent = `${day} ${month}, ${year}`;
    }

    function createTallyMarkup(count) {
      const groupsOfFive = Math.floor(count / 5);
      const remainder = count % 5;
      let html = "";

      for (let i = 0; i < groupsOfFive; i++) {
        html += `
          <div class="tally-group">
            <span class="stroke s1"></span>
            <span class="stroke s2"></span>
            <span class="stroke s3"></span>
            <span class="stroke s4"></span>
            <span class="stroke diag"></span>
          </div>
        `;
      }

      for (let i = 0; i < remainder; i++) {
        html += `<span class="single-i">I</span>`;
      }

      return html || `<span class="single-i" style="opacity:0.35;">—</span>`;
    }

    function renderTally() {
      tallyBox.innerHTML = createTallyMarkup(tallyCount);
    }

    function saveTally() {
      const payload = {
        date: getTodayKey(),
        count: tallyCount
      };
      localStorage.setItem("pomodoroTallyData", JSON.stringify(payload));
    }

    function loadTally() {
      const raw = localStorage.getItem("pomodoroTallyData");
      const today = getTodayKey();

      if (!raw) {
        tallyCount = 0;
        saveTally();
        return;
      }

      try {
        const data = JSON.parse(raw);
        if (data.date === today) {
          tallyCount = Number(data.count) || 0;
        } else {
          tallyCount = 0;
          saveTally();
        }
      } catch (error) {
        tallyCount = 0;
        saveTally();
      }
    }

    function addTally() {
      tallyCount++;
      renderTally();
      saveTally();
    }

    function resetTimer() {
      timeLeft = TOTAL_TIME;
      isFinished = false;
      updateClock();
      controlBtn.textContent = "Start";
    }

    function finishTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
      isFinished = true;
      clock.textContent = "00:00";
      controlBtn.textContent = "Reset";
      addTally();
      showNotification();
      alert("時間到囉！休息一下 🍅");
    }

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--;
        updateClock();

        if (timeLeft <= 0) {
          finishTimer();
        }
      }, 1000);
    }

    function toggleTimer() {
      if (isFinished) {
        resetTimer();
        return;
      }

      if (!isRunning) {
        isRunning = true;
        controlBtn.textContent = "Pause";
        startTimer();
      } else {
        isRunning = false;
        clearInterval(timer);
        timer = null;
        controlBtn.textContent = "Start";
      }
    }

    function saveTodos() {
      localStorage.setItem("pomodoroTodoList", JSON.stringify(todos));
    }

    function loadTodos() {
      const raw = localStorage.getItem("pomodoroTodoList");
      if (!raw) {
        todos = [];
        return;
      }

      try {
        const data = JSON.parse(raw);
        todos = Array.isArray(data) ? data : [];
      } catch (error) {
        todos = [];
      }
    }

    function createDust(x, y, parent) {
      const dustLayer = document.createElement("div");
      dustLayer.className = "chalk-dust";

      const particles = 10;
      for (let i = 0; i < particles; i++) {
        const p = document.createElement("span");
        p.className = "dust";
        p.style.left = `${x + (Math.random() * 14 - 7)}px`;
        p.style.top = `${y + (Math.random() * 10 - 5)}px`;
        p.style.setProperty("--dx", `${Math.random() * 34 - 17}px`);
        p.style.setProperty("--dy", `${-8 - Math.random() * 28}px`);
        p.style.width = `${4 + Math.random() * 4}px`;
        p.style.height = p.style.width;
        dustLayer.appendChild(p);
      }

      parent.appendChild(dustLayer);
      setTimeout(() => dustLayer.remove(), 950);
    }

    function renderTodos() {
      todoList.innerHTML = "";

      if (todos.length === 0) {
        const emptyItem = document.createElement("li");
        emptyItem.className = "todo-item";
        emptyItem.style.opacity = "0.55";
        emptyItem.innerHTML = `<span class="todo-text">Nothing yet...</span>`;
        todoList.appendChild(emptyItem);
        return;
      }

      todos.forEach((todo) => {
        const li = document.createElement("li");
        li.className = "todo-item";
        li.dataset.id = String(todo.id);
        if (todo.done) {
          li.classList.add("done");
        }

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "todo-check";
        checkbox.checked = todo.done;

        const text = document.createElement("span");
        text.className = "todo-text";
        text.textContent = todo.text;

        checkbox.addEventListener("change", () => {
          const wasDone = todo.done;
          todo.done = checkbox.checked;
          saveTodos();
          renderTodos();

          if (!wasDone && todo.done) {
            requestAnimationFrame(() => {
              const currentItem = [...todoList.querySelectorAll(".todo-item")]
                .find(item => item.dataset.id === String(todo.id));

              if (!currentItem) return;

              const textEl = currentItem.querySelector(".todo-text");
              if (!textEl) return;

              const textRect = textEl.getBoundingClientRect();
              const parentRect = currentItem.getBoundingClientRect();
              const x = textRect.left - parentRect.left + textRect.width * 0.55;
              const y = textRect.top - parentRect.top + textRect.height * 0.52;

              createDust(x, y, currentItem);
            });
          }
        });

        li.appendChild(checkbox);
        li.appendChild(text);
        todoList.appendChild(li);
      });
    }
    
    function showNotification() {
    if (Notification.permission === "granted") {
    new Notification("Pomodoro 完成！", {
      body: "25分鐘結束，休息一下 🍅",
      icon: "https://cdn-icons-png.flaticon.com/512/590/590685.png"
    });
    }
    }   

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;

      todos.push({
        id: Date.now(),
        text,
        done: false
      });

      todoInput.value = "";
      saveTodos();
      renderTodos();
    }

    function eraseAllTodos() {
      todos = [];
      saveTodos();
      renderTodos();
    }

    controlBtn.addEventListener("click", toggleTimer);
    addTallyBtn.addEventListener("click", addTally);

    todoAddBtn.addEventListener("click", addTodo);
    eraseAllBtn.addEventListener("click", eraseAllTodos);

    todoInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addTodo();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        const active = document.activeElement;
        const tag = active ? active.tagName : "";
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "BUTTON") return;
        event.preventDefault();
        toggleTimer();
      }
    });

    setTodayDate();
    loadTally();
    renderTally();
    loadTodos();
    renderTodos();
    updateClock();
  </script>
</body>
</html>
