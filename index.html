<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.5), transparent 16%),
        radial-gradient(circle at 82% 20%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.2), transparent 16%),
        linear-gradient(180deg, #f9efcf 0%, #f8e8bf 52%, #f6dfb0 100%);
      font-family:
        "Mochiy Pop One",
        "Zen Maru Gothic",
        "Arial Rounded MT Bold",
        "Microsoft JhengHei",
        sans-serif;
      position: relative;
      overflow-x: hidden;
      color: #6e4821;
    }

    .cloud {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.82;
      filter: drop-shadow(0 4px 0 rgba(255,255,255,0.45));
      font-size: clamp(34px, 5vw, 58px);
      animation: floaty 6s ease-in-out infinite;
    }

    .cloud.c1 { top: 24px; left: 28px; }
    .cloud.c2 { top: 78px; right: 38px; animation-delay: 1.2s; }
    .cloud.c3 { bottom: 120px; right: 110px; animation-delay: 2s; }

    .star-sticker,
    .dino-sticker {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.08));
      animation: bob 3.2s ease-in-out infinite;
    }

    .star-sticker {
      font-size: clamp(24px, 3vw, 34px);
    }

    .star-sticker.s1 { top: 120px; left: 80px; }
    .star-sticker.s2 { top: 180px; right: 120px; animation-delay: 0.8s; }
    .star-sticker.s3 { bottom: 180px; left: 150px; animation-delay: 1.4s; }

    .dino-sticker {
      font-size: clamp(40px, 5vw, 64px);
    }

    .dino-sticker.d1 {
      right: 42px;
      bottom: 42px;
      transform: rotate(-8deg);
    }

    .dino-sticker.d2 {
      left: 42px;
      top: 280px;
      transform: rotate(8deg);
      animation-delay: 1.2s;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 24px;
      z-index: 2;
    }

    .timer-card {
      width: min(560px, 92vw);
      min-height: 480px;
      padding: 42px 34px 30px;
      border-radius: 34px;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.9), transparent 20%),
        linear-gradient(180deg, #fff9ec 0%, #fff3db 100%);
      box-shadow:
        0 14px 0 #e8bc58,
        0 24px 36px rgba(0, 0, 0, 0.14);
      text-align: center;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 6px solid #f18b2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3;
    }

    .timer-card::before {
      content: "🍅";
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 42px;
      background: #fff8e8;
      border-radius: 999px;
      padding: 4px 12px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    }

    .timer-card::after {
      content: "✨";
      position: absolute;
      right: 18px;
      top: 18px;
      font-size: 24px;
      opacity: 0.85;
      transform: rotate(10deg);
    }

    h1 {
      margin-top: 22px;
      margin-bottom: 18px;
      font-size: clamp(46px, 7vw, 82px);
      color: #f07d24;
      font-weight: 900;
      text-shadow:
        2px 2px 0 rgba(255,255,255,0.7),
        0 4px 0 rgba(241, 192, 109, 0.85);
      letter-spacing: 2px;
      line-height: 1.05;
    }

    .subtitle-chip {
      margin-top: -2px;
      margin-bottom: 18px;
      padding: 8px 16px;
      border-radius: 999px;
      background: #ffe8b7;
      color: #9a6323;
      font-size: 13px;
      box-shadow: 0 4px 0 #efc36f;
      transform: rotate(-2deg);
    }

    .clock {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 190px;
      margin: 10px 0 26px 0;
      padding: 14px 16px;
      border-radius: 24px;
      border: 5px solid #f18b2e;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08), transparent 30%),
        #4a3526;
      color: #fff2a8;
      font-size: clamp(64px, 11vw, 118px);
      font-weight: bold;
      letter-spacing: clamp(2px, 0.6vw, 6px);
      line-height: 1;
      box-shadow:
        inset 0 4px 10px rgba(255,255,255,0.08),
        0 7px 0 #d95e1d;
      text-shadow:
        0 0 8px rgba(255, 239, 159, 0.35),
        0 0 20px rgba(255, 239, 159, 0.15);
      text-align: center;
    }

    .btn {
      border: none;
      outline: none;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: 900;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffaf4d, #f47c20);
      color: white;
      cursor: pointer;
      box-shadow:
        0 6px 0 #d95e1d,
        0 10px 16px rgba(244, 124, 32, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(2px) scale(1.02);
      box-shadow:
        0 4px 0 #d95e1d,
        0 8px 12px rgba(244, 124, 32, 0.18);
    }

    .btn:active {
      transform: translateY(4px) scale(0.98);
      box-shadow: 0 2px 0 #d95e1d;
    }

    .hint {
      margin-top: 18px;
      font-size: clamp(16px, 2vw, 24px);
      color: #8d5a20;
      line-height: 1.8;
      max-width: 90%;
    }

    .wood-board {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 290px;
      min-height: 246px;
      padding: 20px 18px 20px;
      border: 5px solid #d56a21;
      border-radius: 22px;
      box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.14),
        inset 0 2px 10px rgba(255, 255, 255, 0.12),
        inset 0 -3px 10px rgba(70, 35, 10, 0.18);
      color: #4e2f12;
      overflow: hidden;
      z-index: 4;
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,0.05) 0%,
          rgba(255,255,255,0.01) 8%,
          rgba(0,0,0,0.05) 14%,
          rgba(255,255,255,0.03) 22%,
          rgba(0,0,0,0.04) 31%,
          rgba(255,255,255,0.02) 40%,
          rgba(0,0,0,0.06) 52%,
          rgba(255,255,255,0.03) 64%,
          rgba(0,0,0,0.04) 78%,
          rgba(255,255,255,0.02) 100%
        ),
        linear-gradient(145deg, #f0a14d, #dd7c2f 55%, #cb6520);
    }

    .wood-board::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          8deg,
          rgba(88, 46, 16, 0.07) 0px,
          rgba(88, 46, 16, 0.07) 2px,
          transparent 2px,
          transparent 12px
        );
      opacity: 0.65;
      mix-blend-mode: multiply;
    }

    .wood-board::after {
      content: "🦖";
      position: absolute;
      right: 12px;
      bottom: 8px;
      font-size: 34px;
      opacity: 0.92;
      transform: rotate(-8deg);
      filter: drop-shadow(0 2px 0 rgba(0,0,0,0.08));
    }

    .pin,
    .pin-right,
    .chalk-pin,
    .chalk-pin-right {
      position: absolute;
      top: 10px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      z-index: 2;
    }

    .pin,
    .pin-right {
      background: radial-gradient(circle at 35% 35%, #a26d3a, #6e4420 70%);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
    }

    .pin { left: 12px; }
    .pin-right { right: 12px; }

    .board-title {
      position: relative;
      z-index: 2;
      margin: 8px 0 10px;
      text-align: center;
      font-size: 22px;
      color: #fff9e8;
      letter-spacing: 1px;
      text-shadow:
        1px 1px 0 rgba(255,255,255,0.15),
        -1px -1px 0 rgba(255,255,255,0.08),
        0 0 2px rgba(255,255,255,0.12);
      transform: rotate(-1.5deg);
    }

    .board-date {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 14px;
      font-size: 18px;
      color: #fff8e1;
      text-shadow:
        0.6px 0.6px 0 rgba(255,255,255,0.2),
        -0.6px -0.6px 0 rgba(255,255,255,0.08);
      transform: rotate(-2deg);
    }

    .tally-box {
      position: relative;
      z-index: 2;
      min-height: 106px;
      background: rgba(255, 248, 220, 0.12);
      border: 2px dashed rgba(255, 248, 220, 0.35);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 10px 14px;
    }

    @keyframes toy-wiggle {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-1.5deg); }
      50% { transform: rotate(1.5deg); }
      75% { transform: rotate(-1deg); }
      100% { transform: rotate(0deg); }
    }

    .tally-group {
      position: relative;
      width: 66px;
      height: 60px;
      display: inline-block;
      transform: rotate(-2deg);
    }

    .stroke {
      position: absolute;
      width: 3.8px;
      height: 43px;
      background: #fff8eb;
      border-radius: 999px;
      top: 8px;
      box-shadow:
        0 0 1px rgba(255,255,255,0.25),
        0 0 2px rgba(255,255,255,0.15);
      opacity: 0.95;
    }

    .stroke.s1 { left: 6px; height: 40px; transform: rotate(-7deg); }
    .stroke.s2 { left: 20px; height: 45px; transform: rotate(3deg); }
    .stroke.s3 { left: 35px; height: 42px; transform: rotate(-4deg); }
    .stroke.s4 { left: 49px; height: 46px; transform: rotate(5deg); }
    .stroke.diag { width: 4px; height: 62px; left: 28px; top: -1px; transform: rotate(59deg); }

    .single-i {
      font-size: 42px;
      line-height: 1;
      color: #fff8eb;
      text-shadow:
        0 0 1px rgba(255,255,255,0.2),
        0 0 2px rgba(255,255,255,0.12);
      display: inline-block;
      min-width: 18px;
      text-align: center;
      opacity: 0.96;
    }

    .single-i:nth-child(odd) { transform: rotate(-8deg) translateY(1px); }
    .single-i:nth-child(even) { transform: rotate(6deg) translateY(-1px); }

    .board-btn {
      position: relative;
      z-index: 2;
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 11px 14px;
      background: #fff0c8;
      color: #7a3f12;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 #c96d2b;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: inherit;
    }

    .board-btn:hover {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b77b42;
    }

    .board-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #b77b42;
    }

    .chalk-board {
      position: absolute;
      left: 24px;
      bottom: 24px;
      width: 360px;
      min-height: 378px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      border: 8px solid #d8742f;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 18%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(180deg, #2f3e35, #243128 65%, #1f2a22);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 0 30px rgba(255,255,255,0.03);
      overflow: hidden;
      z-index: 4;
    }

    .chalk-board::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 2px,
          transparent 2px,
          transparent 10px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.01) 0px,
          rgba(255,255,255,0.01) 2px,
          transparent 2px,
          transparent 14px
        );
      opacity: 0.5;
      pointer-events: none;
    }

    .chalk-board::after {
      content: "🦕";
      position: absolute;
      left: 12px;
      bottom: 8px;
      font-size: 30px;
      opacity: 0.9;
      transform: rotate(8deg);
    }

    .chalk-pin,
    .chalk-pin-right {
      background: radial-gradient(circle at 35% 35%, #b07b4c, #6a4120 70%);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.25);
    }

    .chalk-pin { left: 12px; }
    .chalk-pin-right { right: 12px; }

    .chalk-title {
      position: relative;
      z-index: 2;
      margin: 4px 0 14px;
      color: #f8f8f1;
      font-size: 28px;
      text-align: center;
      text-shadow: 0 0 2px rgba(255,255,255,0.15);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
      transform: rotate(-1deg);
    }

    .todo-input-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    .todo-input {
      min-width: 0;
      border: 3px dashed rgba(255,255,255,0.22);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: #fffef8;
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
    }

    .todo-input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .todo-add-btn,
    .eraser-btn {
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      font-family: inherit;
    }

    .todo-add-btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffb347, #f47c20);
      color: #fffaf2;
      box-shadow:
        0 5px 0 #d95e1d,
        0 8px 14px rgba(244, 124, 32, 0.22);
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 0.5px;
      animation: toy-wiggle 3.2s ease-in-out infinite;
    }

    .todo-add-btn::before {
      content: "✦";
      margin-right: 6px;
      color: #fff4c7;
    }

    .eraser-btn {
      width: 56px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffe7d6, #f3d4c3);
      box-shadow:
        0 5px 0 #bf9b89,
        0 8px 14px rgba(0, 0, 0, 0.12);
      position: relative;
      flex-shrink: 0;
      animation: toy-wiggle 4s ease-in-out infinite;
    }

    .eraser-btn::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 13px;
      left: 50%;
      top: 10px;
      transform: translateX(-50%) rotate(-12deg);
      background: #ff9ea8;
      border-radius: 4px 4px 2px 2px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .eraser-btn::after {
      content: "✨";
      position: absolute;
      right: -8px;
      top: -6px;
      font-size: 14px;
      opacity: 0.8;
      animation: sparkle 2s infinite;
    }

    @keyframes sparkle {
      0% { transform: scale(0.7); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.7); opacity: 0.4; }
    }

    .todo-add-btn:hover,
    .eraser-btn:hover {
      transform: scale(1.05);
    }

    .todo-add-btn:active {
      transform: translateY(4px) scale(0.95);
    }

    .eraser-btn:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #bf9b89,
        0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .todo-list {
      position: relative;
      z-index: 2;
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 235px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #fffef5;
      font-size: 21px;
      line-height: 1.3;
      word-break: break-word;
      animation: chalk-write 0.35s ease-out;
    }

    .todo-check {
      appearance: none;
      -webkit-appearance: none;
      margin-top: 4px;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .todo-check:checked::after {
      content: "✓";
      position: absolute;
      left: 2px;
      top: -3px;
      color: #fff6cf;
      font-size: 20px;
      transform: rotate(-8deg);
    }

    .todo-text {
      position: relative;
      display: inline-block;
      padding-right: 8px;
    }

    .todo-item.done .todo-text {
      color: rgba(255,255,255,0.72);
    }

    .todo-item.done .todo-text::before,
    .todo-item.done .todo-text::after {
      content: "";
      position: absolute;
      left: -4px;
      right: -2px;
      border-radius: 999px;
      background: rgba(255,245,205,0.95);
      box-shadow: 0 0 2px rgba(255,255,255,0.18);
    }

    .todo-item.done .todo-text::before {
      top: 52%;
      height: 3px;
      transform: rotate(-4deg);
      opacity: 0.95;
    }

    .todo-item.done .todo-text::after {
      top: 49%;
      height: 2px;
      transform: rotate(-1deg);
      opacity: 0.72;
    }

    .chalk-dust {
      position: absolute;
      pointer-events: none;
      inset: 0;
      overflow: visible;
      z-index: 5;
    }

    .dust {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255,248,230,0.95);
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(255,255,255,0.2);
      animation: dust-float 900ms ease-out forwards;
    }

    @keyframes dust-float {
      0% {
        opacity: 0.95;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.35);
      }
    }

    .tomato-rain {
      position: fixed;
      left: 0;
      top: -50px;
      font-size: 28px;
      animation: tomato-fall 2s linear forwards;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes tomato-fall {
      0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.9;
      }
    }

    @keyframes chalk-write {
      0% {
        opacity: 0;
        transform: translateX(-8px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .mobile-topbar {
      display: none;
    }

    @media (max-width: 980px) {
      .page {
        padding: 18px 16px 24px;
      }

      .cloud.c3,
      .star-sticker.s3,
      .dino-sticker.d2 {
        display: none;
      }

      .wood-board,
      .chalk-board,
      .timer-card {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        transform: none;
        margin: 0 auto 18px;
      }

      .timer-card {
        width: min(100%, 560px);
        min-height: auto;
        order: 1;
      }

      .wood-board {
        width: min(100%, 320px);
        order: 2;
      }

      .chalk-board {
        width: min(100%, 380px);
        min-height: 330px;
        order: 3;
      }

      .mobile-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      body {
        overflow-y: auto;
      }

      h1 {
        font-size: 56px;
      }

      .clock {
        min-height: 132px;
        font-size: 72px;
        letter-spacing: 3px;
      }

      .hint {
        font-size: 18px;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px 12px 20px;
      }

      .cloud {
        font-size: 34px;
      }

      .star-sticker,
      .dino-sticker {
        display: none;
      }

      .timer-card {
        padding: 28px 18px 22px;
        border-radius: 26px;
      }

      .timer-card::before {
        font-size: 34px;
        top: -20px;
      }

      h1 {
        font-size: 42px;
        margin-top: 14px;
      }

      .subtitle-chip {
        font-size: 11px;
        padding: 7px 12px;
      }

      .clock {
        min-height: 112px;
        font-size: 54px;
        letter-spacing: 2px;
        border-radius: 18px;
      }

      .btn {
        font-size: 17px;
        padding: 13px 22px;
      }

      .hint {
        font-size: 15px;
        line-height: 1.7;
      }

      .wood-board,
      .chalk-board {
        width: 100%;
      }

      .chalk-board {
        min-height: 300px;
      }

      .chalk-title {
        font-size: 24px;
      }

      .todo-item {
        font-size: 18px;
      }

      .todo-input-row {
        grid-template-columns: 1fr;
      }

      .todo-add-btn,
      .eraser-btn {
        width: 100%;
      }

      .eraser-btn {
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="cloud c1">☁️</div>
  <div class="cloud c2">☁️</div>
  <div class="cloud c3">☁️</div>

  <div class="star-sticker s1">⭐</div>
  <div class="star-sticker s2">✨</div>
  <div class="star-sticker s3">🌟</div>

  <div class="dino-sticker d1">🦖</div>
  <div class="dino-sticker d2">🦕</div>

  <div class="page">
    <div class="mobile-stack">
      <div class="wood-board">
        <span class="pin"></span>
        <span class="pin-right"></span>

        <div class="board-title">Today's Count</div>
        <div class="board-date" id="todayDate"></div>
        <div class="tally-box" id="tallyBox"></div>
        <button class="board-btn" id="addTallyBtn">+ Add One</button>
      </div>

      <div class="chalk-board">
        <span class="chalk-pin"></span>
        <span class="chalk-pin-right"></span>

        <div class="chalk-title">Today's List</div>

        <div class="todo-input-row">
          <input
            id="todoInput"
            class="todo-input"
            type="text"
            placeholder="Write something here..."
            maxlength="60"
          />
          <button id="todoAddBtn" class="todo-add-btn">Add</button>
          <button id="eraseAllBtn" class="eraser-btn" title="Erase all"></button>
        </div>

        <ul id="todoList" class="todo-list"></ul>
      </div>

      <div class="timer-card">
        <h1>Pomodoro</h1>
        <div class="subtitle-chip"> 強くなる！</div>
        <div class="clock" id="clock">25:00</div>
        <button class="btn" id="controlBtn">Start</button>
        <div class="hint">
          Make It fun, and Do it for Fun.<br>
          ☕🦖🍅
        </div>
      </div>
    </div>
  </div>

  <script>
    if ("Notification" in window && Notification.permission !== "granted") {
      Notification.requestPermission();
    }

    const TOTAL_TIME = 25 * 60;

    let timeLeft = TOTAL_TIME;
    let timer = null;
    let isRunning = false;
    let isFinished = false;
    let tallyCount = 0;
    let todos = [];

    const clock = document.getElementById("clock");
    const controlBtn = document.getElementById("controlBtn");
    const todayDate = document.getElementById("todayDate");
    const tallyBox = document.getElementById("tallyBox");
    const addTallyBtn = document.getElementById("addTallyBtn");

    const todoInput = document.getElementById("todoInput");
    const todoAddBtn = document.getElementById("todoAddBtn");
    const eraseAllBtn = document.getElementById("eraseAllBtn");
    const todoList = document.getElementById("todoList");

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatTime(seconds) {
      const minutes = String(Math.floor(seconds / 60)).padStart(2, "0");
      const secs = String(seconds % 60).padStart(2, "0");
      return `${minutes}:${secs}`;
    }

    function updateClock() {
      clock.textContent = formatTime(timeLeft);
    }

    function setTodayDate() {
      const now = new Date();
      const day = now.getDate();
      const month = now.toLocaleString("en-US", { month: "long" });
      const year = now.getFullYear();
      todayDate.textContent = `${day} ${month}, ${year}`;
    }

    function createTallyMarkup(count) {
      const groupsOfFive = Math.floor(count / 5);
      const remainder = count % 5;
      let html = "";

      for (let i = 0; i < groupsOfFive; i++) {
        html += `
          <div class="tally-group">
            <span class="stroke s1"></span>
            <span class="stroke s2"></span>
            <span class="stroke s3"></span>
            <span class="stroke s4"></span>
            <span class="stroke diag"></span>
          </div>
        `;
      }

      for (let i = 0; i < remainder; i++) {
        html += `<span class="single-i">I</span>`;
      }

      return html || `<span class="single-i" style="opacity:0.35;">—</span>`;
    }

    function renderTally() {
      tallyBox.innerHTML = createTallyMarkup(tallyCount);
    }

    function tomatoRain() {
      for (let i = 0; i < 15; i++) {
        const t = document.createElement("div");
        t.className = "tomato-rain";
        t.innerText = "🍅";
        t.style.left = Math.random() * window.innerWidth + "px";
        t.style.animationDelay = Math.random() * 0.5 + "s";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
      }
    }

    function saveTally() {
      const payload = {
        date: getTodayKey(),
        count: tallyCount
      };
      localStorage.setItem("pomodoroTallyData", JSON.stringify(payload));
    }

    function loadTally() {
      const raw = localStorage.getItem("pomodoroTallyData");
      const today = getTodayKey();

      if (!raw) {
        tallyCount = 0;
        saveTally();
        return;
      }

      try {
        const data = JSON.parse(raw);
        if (data.date === today) {
          tallyCount = Number(data.count) || 0;
        } else {
          tallyCount = 0;
          saveTally();
        }
      } catch (error) {
        tallyCount = 0;
        saveTally();
      }
    }

    function addTally() {
      tallyCount++;
      renderTally();
      saveTally();
    }

    function resetTimer() {
      timeLeft = TOTAL_TIME;
      isFinished = false;
      updateClock();
      controlBtn.textContent = "Start";
    }

    function showNotification() {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("Pomodoro 完成！", {
          body: "25分鐘結束，休息一下 🍅",
          icon: "https://cdn-icons-png.flaticon.com/512/590/590685.png"
        });
      }
    }

    function finishTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
      isFinished = true;
      clock.textContent = "00:00";
      controlBtn.textContent = "Reset";
      addTally();
      tomatoRain();
      showNotification();
      alert("時間到囉！休息一下 🍅");
    }

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--;
        updateClock();

        if (timeLeft <= 0) {
          finishTimer();
        }
      }, 1000);
    }

    function toggleTimer() {
      if (isFinished) {
        resetTimer();
        return;
      }

      if (!isRunning) {
        isRunning = true;
        controlBtn.textContent = "Pause";
        startTimer();
      } else {
        isRunning = false;
        clearInterval(timer);
        timer = null;
        controlBtn.textContent = "Start";
      }
    }

    function saveTodos() {
      localStorage.setItem("pomodoroTodoList", JSON.stringify(todos));
    }

    function loadTodos() {
      const raw = localStorage.getItem("pomodoroTodoList");
      if (!raw) {
        todos = [];
        return;
      }

      try {
        const data = JSON.parse(raw);
        todos = Array.isArray(data) ? data : [];
      } catch (error) {
        todos = [];
      }
    }

    function createDust(x, y, parent) {
      const dustLayer = document.createElement("div");
      dustLayer.className = "chalk-dust";

      const particles = 10;
      for (let i = 0; i < particles; i++) {
        const p = document.createElement("span");
        p.className = "dust";
        p.style.left = `${x + (Math.random() * 14 - 7)}px`;
        p.style.top = `${y + (Math.random() * 10 - 5)}px`;
        p.style.setProperty("--dx", `${Math.random() * 34 - 17}px`);
        p.style.setProperty("--dy", `${-8 - Math.random() * 28}px`);
        p.style.width = `${4 + Math.random() * 4}px`;
        p.style.height = p.style.width;
        dustLayer.appendChild(p);
      }

      parent.appendChild(dustLayer);
      setTimeout(() => dustLayer.remove(), 950);
    }

    function renderTodos() {
      todoList.innerHTML = "";

      if (todos.length === 0) {
        const emptyItem = document.createElement("li");
        emptyItem.className = "todo-item";
        emptyItem.style.opacity = "0.55";
        emptyItem.innerHTML = `<span class="todo-text">Nothing yet...</span>`;
        todoList.appendChild(emptyItem);
        return;
      }

      todos.forEach((todo) => {
        const li = document.createElement("li");
        li.className = "todo-item";
        li.dataset.id = String(todo.id);

        if (todo.done) {
          li.classList.add("done");
        }

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "todo-check";
        checkbox.checked = todo.done;

        const text = document.createElement("span");
        text.className = "todo-text";
        text.textContent = todo.text;

        checkbox.addEventListener("change", () => {
          const wasDone = todo.done;
          todo.done = checkbox.checked;
          saveTodos();
          renderTodos();

          if (!wasDone && todo.done) {
            requestAnimationFrame(() => {
              const currentItem = [...todoList.querySelectorAll(".todo-item")]
                .find(item => item.dataset.id === String(todo.id));

              if (!currentItem) return;

              const textEl = currentItem.querySelector(".todo-text");
              if (!textEl) return;

              const textRect = textEl.getBoundingClientRect();
              const parentRect = currentItem.getBoundingClientRect();
              const x = textRect.left - parentRect.left + textRect.width * 0.55;
              const y = textRect.top - parentRect.top + textRect.height * 0.52;

              createDust(x, y, currentItem);
            });
          }
        });

        li.appendChild(checkbox);
        li.appendChild(text);
        todoList.appendChild(li);
      });
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;

      todos.push({
        id: Date.now(),
        text,
        done: false
      });

      const chalkSound = new Audio(
        "https://actions.google.com/sounds/v1/foley/chalk_writing.ogg"
      );
      chalkSound.play().catch(err => console.log("音效播放失敗", err));

      todoInput.value = "";
      saveTodos();
      renderTodos();
    }

    function eraseAllTodos() {
      todos = [];
      saveTodos();
      renderTodos();
    }

    controlBtn.addEventListener("click", toggleTimer);
    addTallyBtn.addEventListener("click", addTally);
    todoAddBtn.addEventListener("click", addTodo);
    eraseAllBtn.addEventListener("click", eraseAllTodos);

    todoInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addTodo();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        const active = document.activeElement;
        const tag = active ? active.tagName : "";
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "BUTTON") return;
        event.preventDefault();
        toggleTimer();
      }
    });

    setTodayDate();
    loadTally();
    renderTally();
    loadTodos();
    renderTodos();
    updateClock();
  </script>
</body>
</html>
